name: Skill Health Check

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  skill-health:
    name: Score skill health against ATT&CK + NVD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SKILL_HEALTH_PAT }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run skill-health script
        id: health
        run: |
          node scripts/skill-health.js
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check health.json was written
        run: |
          if [ ! -f health.json ]; then
            echo "ERROR: health.json was not written"
            exit 1
          fi
          cat health.json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const j=JSON.parse(d);
            Object.entries(j.skills).forEach(([k,v]) => {
              const badge = v['health-score']>=0.90?'🟢':v['health-score']>=0.75?'🟡':'🔴';
              console.log(badge+' '+k+': '+v['health-score']);
            });
          "

      - name: Commit updated health.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health.json
          git diff --staged --quiet || git commit -m "chore(health): update skill health scores [skip ci]"

      - name: Push changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git push origin main
          fi

      - name: Check for skills below threshold
        id: threshold
        run: |
          FAILING=$(node -e "
            const h=require('./health.json');
            const failing=Object.entries(h.skills)
              .filter(([,v])=>v['health-score']<0.80)
              .map(([k,v])=>k+' ('+v['health-score']+')');
            console.log(failing.join(', '));
          ")
          if [ -n "$FAILING" ]; then
            echo "failing=$FAILING" >> $GITHUB_OUTPUT
            echo "needs_pr=true" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for stale skills
        if: steps.threshold.outputs.needs_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.SKILL_HEALTH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Check if PAT is available, fall back to GitHub token
          if [ -z "${{ secrets.SKILL_HEALTH_PAT }}" ]; then
            echo "⚠️ Warning: SKILL_HEALTH_PAT secret not configured"
            echo "Set SKILL_HEALTH_PAT in GitHub secrets to enable PR creation"
            exit 0
          fi

          BRANCH="skill-health-update/${{ github.run_number }}"

          # Create branch if it doesn't exist
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git push -u origin "$BRANCH" 2>/dev/null || true

          # Create PR using GitHub CLI
          gh pr create \
            --title "🔴 Skill health update required — skills below 0.80" \
            --body "## Skill Health Alert

The weekly skill health check found the following skills below the **0.80 threshold**:

**Failing skills:** ${{ steps.threshold.outputs.failing }}

### What to do

1. Review \`health.json\` for the specific gaps
2. Update the relevant skill phase content to reference newer ATT&CK techniques or recently-patched CVEs
3. Re-run \`node scripts/skill-health.js\` locally to verify the score improves
4. Merge this PR to update \`health.json\`

---
*Generated by [skill-health workflow](.github/workflows/skill-health.yml)*" \
            --base main \
            --head "$BRANCH" \
            --label "skill-health" \
            --label "automated" || echo "PR already exists or unable to create"
